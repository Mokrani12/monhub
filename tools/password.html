<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Générateur de mots de passe — MonHub</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <main class="container tool-page">
    <a class="back-link" href="../index.html">← Retour</a>
    <h1>🔐 Générateur de mots de passe</h1>
    <label for="len">Longueur</label>
    <input id="len" type="number" value="16" min="4" max="64" />
    <button id="gen">Générer</button>
    <div class="result" id="out"></div>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    $("gen").addEventListener("click", () => {
      const len = Math.min(64, Math.max(4, parseInt($("len").value) || 16));
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%&*";
      let out = "";
      const arr = new Uint32Array(len);
      crypto.getRandomValues(arr);
      for (let i = 0; i < len; i++) out += chars[arr[i] % chars.length];
      $("out").textContent = out;
    });
  </script>
</body>
</html>

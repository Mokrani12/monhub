<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Générateur de codes — MonHub</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <main class="container tool-page">
    <a class="back-link" href="../premium.html">← Retour Premium</a>
    <h1>🔑 Générateur de codes</h1>
    <p style="color:var(--muted)">Générez des codes uniques à vendre. Copiez-les et donnez-en un par acheteur.</p>
    <label for="n">Nombre de codes</label>
    <input id="n" type="number" value="5" min="1" max="50" />
    <button id="gen">Générer</button>
    <div class="result" id="out"></div>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    function makeCode() {
      let s = "";
      const a = new Uint32Array(6);
      crypto.getRandomValues(a);
      for (let i = 0; i < 6; i++) s += chars[a[i] % chars.length];
      return "PREMIUM-" + s;
    }
    $("gen").addEventListener("click", () => {
      const n = Math.min(50, Math.max(1, +$("n").value || 1));
      const codes = [];
      for (let i = 0; i < n; i++) codes.push(makeCode());
      $("out").textContent = codes.join("\n");
    });
  </script>
</body>
</html>
